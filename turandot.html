<script>
let L = 'cn', C = null, T = 'bg';

const DATA = [
  { id:1, name:"铜锣之声", nameE:"The Gong of Peking", con:"东方主义 Orientalism", conE:"Orientalism",
    bg:"元朝皇宫。波斯王子答错谜语被押赴刑场，铜锣需要被敲响以宣布新求婚者的到来。混乱中，有人目击了敲锣的身影，但没人看清是谁。",
    bgE:"The Yuan Dynasty palace. The Prince of Persia has failed the riddle and is being led to the execution ground. The gong must be struck to announce a new suitor's arrival. In the chaos, someone witnessed the gong being struck, but no one saw clearly who it was.",
    who:["卡拉夫","柳儿","铁木尔","平大人","波斯王子","皇帝"], whoE:["Calaf","Liu","Timur","Ping","Prince of Persia","The Emperor"],
    whoD:["鞑靼流亡王子，对图兰朵一见钟情，决定亲自敲锣求婚。","铁木尔的侍女，温柔忠诚，始终跟随主人。","失明的鞑靼老国王，卡拉夫的父亲，反对儿子冒险。","首席大臣，负责宫廷仪式，熟知所有礼仪规程。","已被押往刑场的失败求婚者，不可能出现在广场。","图兰朵的父亲，年迈体弱，从不下殿参与仪式。"],
    whoDE:["The exiled Tartar prince, who fell in love with Turandot at first sight and decided to strike the gong himself to propose.","Timur's servant, gentle and loyal, always following her master.","The blind old Tartar king, Calaf's father, who opposes his son's risky venture.","The chief minister, responsible for court ceremonies, familiar with all ritual protocols.","The failed suitor already being led to the execution ground; impossible to be at the square.","Turandot's father, old and frail, never descends from the hall to participate in ceremonies."],
    what:["赤手","木棍","鼓槌","剑柄","石块","玉玺"], whatE:["Bare hands","Wooden stick","Drumstick","Sword hilt","Stone","Imperial seal"],
    where:["皇宫广场","城门口","钟楼","花园","刑场","地下牢房"], whereE:["Palace Square","City Gate","Bell Tower","Garden","Execution Ground","Dungeon"],
    whereD:["悬挂铜锣的公开仪式场所，所有民众可见。","铁木尔与卡拉夫重逢之地，城门厚重，无铜锣。","报时之地，仅有钟声，无铜锣悬挂。","茉莉花生长之地，静谧幽雅，非仪式场所。","波斯王子被关押处，戒备森严，与铜锣无关。","关押政治犯的阴暗地牢，远离广场。"],
    whereDE:["The public ceremony venue where the gong is suspended, visible to all people.","Where Timur and Calaf reunited; the heavy city gate has no gong.","For timekeeping; only bells, no gong suspended.","Where jasmine flowers grow; tranquil and elegant, not a ceremony venue.","Where the Prince of Persia is held; heavily guarded, unrelated to the gong.","The dark dungeon for political prisoners, far from the square."],
    clues:["敲锣者不是用任何工具，而是直接用手掌击打铜锣表面。","敲锣者不是本国臣民或侍女，而是来自西方的流亡王子。","波斯王子在铜锣响起时已被押往刑场，不可能出现在广场。","铜锣悬挂在皇宫广场中央，大殿内和城门口均无铜锣。"],
    cluesE:["The gong striker used no tool, but struck the gong surface directly with the palm.","The gong striker was not a local subject or servant, but an exiled prince from the West.","The Prince of Persia was already being led to the execution ground when the gong sounded; impossible to be at the square.","The gong is suspended in the center of the Palace Square; neither the main hall nor the city gate has a gong."],
    test:[
      {sp:"柳儿",spE:"Liu",tx:"我只看到一个人影冲向广场，他跑得太快了，我没看清是谁。但我确定那不是波斯王子——他已经被士兵押走了。",txE:"I only saw a figure rushing toward the square. He ran too fast; I could not see who it was. But I am certain it was not the Prince of Persia — he was already taken away by soldiers."},
      {sp:"铁木尔",spE:"Timur",tx:"我什么也看不见，但我听到了赤手击打金属的声音，沉闷而有力——没有木棒或鼓槌那种清脆的回响。",txE:"I can see nothing, but I heard the sound of bare hands striking metal — dull and forceful — without the crisp echo of a wooden stick or drumstick."},
      {sp:"平大人",spE:"Ping",tx:"按照礼仪，敲锣应由宫廷乐师用鼓槌完成。但那天乐师们都在大殿准备谜语仪式，广场上根本没有鼓槌。",txE:"According to protocol, the gong should be struck by court musicians with drumsticks. But that day, all musicians were in the main hall preparing for the riddle ceremony; there were no drumsticks at the square."},
      {sp:"皇帝",spE:"The Emperor",tx:"我的女儿图兰朵命令，任何求婚者必须亲自敲响铜锣，以证明勇气。这不是臣民可以代劳的事。",txE:"My daughter Turandot has commanded that any suitor must strike the gong personally to prove his courage. This is not something subjects may do on his behalf."}
    ],
    ans:{who:"卡拉夫",what:"赤手",where:"皇宫广场"}, ansE:{who:"Calaf",what:"Bare hands",where:"Palace Square"}
  },
  { id:2, name:"处决之令", nameE:"The Execution Order", con:"刻板印象 Stereotype", conE:"Stereotype",
    bg:"图兰朵公主的三个谜语无人能解，答错者必死。波斯王子失败后，处决命令需要被执行。但在这个被西方凝视的东方专制场景中，是谁下达了最终命令？用什么方式？在何处执行？",
    bgE:"Princess Turandot's three riddles remain unsolved; those who fail must die. After the Prince of Persia's failure, the execution order must be carried out. But in this Oriental despotism scene gazed upon by the West, who issued the final order? By what means? And where?",
    who:["图兰朵","皇帝","平大人","刽子手","铁木尔","卡拉夫"], whoE:["Turandot","The Emperor","Ping","The Executioner","Timur","Calaf"],
    whoD:["谜语的提出者，冷酷公主，拥有决定答错者命运的绝对权力。","图兰朵的父亲，年迈皇帝，虽为君主但已放权给女儿。","首席大臣，负责传达命令，但无最终决策权。","执行处决的人，只负责动手，无权下令。","流亡鞑靼国王，与本案无关的旁观者。","新到的求婚者，尚未参与谜语挑战。"],
    whoDE:["The proposer of the riddles, the cold princess with absolute power to decide the fate of those who answer incorrectly.","Turandot's father, the old Emperor who has delegated power to his daughter.","The chief minister, responsible for conveying orders but with no final decision-making power.","The one who carries out executions; only responsible for the act, not for issuing orders.","The exiled Tartar king, an unrelated bystander in this case.","The newly arrived suitor who has not yet participated in the riddle challenge."],
    what:["斩首令","毒酒","绞索","铜锣的诅咒","图兰朵的谜语","皇帝的玉玺"], whatE:["Decapitation order","Poisoned wine","Noose","Curse of the gong","Turandot's riddle","Imperial jade seal"],
    where:["刑场","大殿","城门口","花园","钟楼","地下牢房"], whereE:["Execution Ground","Main Hall","City Gate","Garden","Bell Tower","Dungeon"],
    whereD:["皇宫外的公开处决场所，供民众围观。","举行朝会和谜语仪式的室内殿堂，非处决之地。","进出城市的通道，无刑具，非处决场所。","种植茉莉花的静谧园林，与处决无关。","报时的高塔，与刑罚无关。","关押犯人的地下空间，不用于公开处决。"],
    whereDE:["The public execution venue outside the palace, for the people to witness.","The indoor hall for court sessions and riddle ceremonies, not a place for execution.","The passage in and out of the city; no execution tools, not an execution venue.","The tranquil garden where jasmine is planted; unrelated to execution.","The tall tower for timekeeping; unrelated to punishment.","The underground space for holding prisoners; not used for public execution."],
    clues:["只有谜语的提出者有权决定答错者的命运，皇帝已多年不干涉女儿的裁决。","处决必须在皇宫外的刑场公开执行，以儆效尤，大殿内从不流血。","按照东方专制传统，答错谜语者必须斩首，毒酒和绞索是其他文化的处决方式。"],
    cluesE:["Only the proposer of the riddles has the authority to decide the fate of those who answer incorrectly; the Emperor has not interfered with his daughter's judgments for years.","Executions must be carried out publicly at the execution ground outside the palace as a warning; blood is never shed inside the main hall.","According to Oriental despotic tradition, those who fail the riddle must be beheaded; poisoned wine and nooses are execution methods from other cultures."],
    test:[
      {sp:"图兰朵",spE:"Turandot",tx:"答错谜语的人必须死。这是我的法则，不是父皇的，也不是任何人的。",txE:"Those who fail my riddles must die. This is my law, not my father's, nor anyone else's."},
      {sp:"平大人",spE:"Ping",tx:"公主殿下亲自签署了斩首令，用的是她自己的印章，不是皇帝的玉玺。",txE:"Her Highness the Princess personally signed the decapitation order, using her own seal, not the Emperor's jade seal."},
      {sp:"刽子手",spE:"The Executioner",tx:"我只奉命行事。那天刑场上要斩首的是波斯王子，用的是大殿传来的正式斩首令。",txE:"I only follow orders. That day, the one to be beheaded at the execution ground was the Prince of Persia, using the formal decapitation order sent from the main hall."},
      {sp:"皇帝",spE:"The Emperor",tx:"我已老了，这些决定都由我的女儿做出。我只在远处看着，从不踏入刑场。",txE:"I am old; these decisions are made by my daughter. I only watch from afar and never step into the execution ground."}
    ],
    ans:{who:"图兰朵",what:"斩首令",where:"刑场"}, ansE:{who:"Turandot",what:"Decapitation order",where:"Execution Ground"}
  },
  { id:3, name:"谜语之宣", nameE:"The Riddle Proclamation", con:"异国情调 Exoticism", conE:"Exoticism",

    whoDE:["The chief minister, responsible for proclaiming royal decrees and ritual texts, familiar with all protocols.","One of the ministers, but had a sore throat that day and could not proclaim loudly.","One of the ministers, but was out of the city on business that day and not in the palace.","The proposer of the riddles, but as a princess would not personally proclaim decrees.","The Emperor, who as the supreme ruler would not personally perform a minister's duty.","The old maid, with no authority or duty to proclaim decrees."],
    what:["谜语卷轴","玉玺","铜锣","茉莉花旋律","皇冠","古琴"], whatE:["Riddle scroll","Jade seal","Gong","Jasmine Flower melody","Crown","Guqin"],
    where:["大殿","御书房","城门口","花园","钟楼","寝宫"], whereE:["Main Hall","Imperial Study","City Gate","Garden","Bell Tower","Bedchamber"],

    whereDE:["The statutory venue for court sessions and public ceremonies, where riddles are proclaimed to suitors.","The Emperor's private study for handling state affairs; not open to the public.","The passage in and out of the city; not a ceremony venue.","The garden where jasmine is planted; not a place for court sessions.","The tall tower for timekeeping; unrelated to ceremonies.","The Princess's private bedchamber; not used for public proclamations."],

    cluesE:["Proclaiming royal riddles is the exclusive duty of the chief minister; the Emperor and Princess, at the apex of power, never proclaim personally.","The riddles are written on a formal royal scroll, not a seal, instrument, or melody.","Pang had a sore throat and Pong was out of the city; only Ping remained to proclaim."],

  { id:4, name:"柳儿之慰", nameE:"Liu's Comfort", con:"女性主义 Feminism", conE:"Feminism",

function setL(lang) {
  L = lang;
  document.getElementById('bCN').className = lang === 'cn' ? 'on' : '';
  document.getElementById('bEN').className = lang === 'en' ? 'on' : '';
  document.querySelectorAll('[data-cn][data-en]').forEach(el => { el.textContent = el.getAttribute('data-' + lang); });
  if (C) render();
  renderSel();
}

function showHome() { switchPage('p-home'); }
function showSel() { switchPage('p-sel'); renderSel(); }
function showGame() { switchPage('p-game'); }
function switchPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function renderSel() {
  const g = document.getElementById('g-sel');
  const cn = L === 'cn';
  g.innerHTML = DATA.map(c => `
    <div class="card" onclick="start(${c.id})">
      <div class="num">0${c.id}</div>
      <div class="name">${c.name}</div>
      <div class="nameE ${cn ? 'hide' : ''}">${c.nameE}</div>
      <div class="tag">${cn ? c.con : c.conE}</div>
      <div class="desc">${cn ? c.bg.substring(0, 55) : c.bgE.substring(0, 80)}...</div>
    </div>
  `).join('');
}

function start(id) {
  C = DATA.find(c => c.id === id);
  T = 'bg';
  showGame();
  render();
  swTab('bg');
}

function render() {
  const cn = L === 'cn';
  document.getElementById('gTitle').textContent = cn ? `案件 0${C.id}：${C.name}` : `Case 0${C.id}: ${C.nameE}`;
  document.getElementById('gBadge').textContent = cn ? C.con : C.conE;
  
  document.getElementById('sBg').innerHTML = `<div class="cn">${C.bg}</div><div class="en ${cn ? 'hide' : ''}">${C.bgE}</div>`;
  
  const wL = cn ? C.who : C.whoE, wD = cn ? C.whoD : C.whoDE;
  document.getElementById('gChar').innerHTML = wL.map((n, i) => `
    <div class="cCard"><div class="n">${n}</div><div class="nE ${cn ? 'hide' : ''}">${C.whoE[i]}</div>
    <div class="d">${wD[i]}</div><div class="dE ${cn ? 'hide' : ''}">${C.whoDE[i]}</div></div>
  `).join('');
  
  const lL = cn ? C.where : C.whereE, lD = cn ? C.whereD : C.whereDE;
  document.getElementById('gLoc').innerHTML = lL.map((n, i) => `
    <div class="cCard"><div class="n" style="color:#5a9e7a">${n}</div><div class="nE ${cn ? 'hide' : ''}">${C.whereE[i]}</div>
    <div class="d">${lD[i]}</div><div class="dE ${cn ? 'hide' : ''}">${C.whereDE[i]}</div></div>
  `).join('');
  
  document.getElementById('gClue').innerHTML = C.clues.map((c, i) => `
    <div class="clue"><span class="num">${cn ? '线索' : 'Clue'} ${i+1}</span>
    <div class="cn">${c}</div><div class="en ${cn ? 'hide' : ''}">${C.cluesE[i]}</div></div>
  `).join('');
  
  document.getElementById('gTest').innerHTML = C.test.map(t => `
    <div class="test"><div class="av">${cn ? t.sp[0] : t.spE[0]}</div>
    <div class="bub"><div class="sp">${cn ? t.sp : t.spE}</div>
    <div class="cn">${t.tx}</div><div class="en ${cn ? 'hide' : ''}">${t.txE}</div></div></div>
  `).join('');
  
  renderDed();
  
  const tL = cn ? C.what : C.whatE, lL2 = cn ? C.where : C.whereE;
  document.getElementById('sWho').innerHTML = `<option value="">${cn ? '选择人物' : 'Select Character'}</option>` + wL.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('sWhat').innerHTML = `<option value="">${cn ? '选择道具' : 'Select Object'}</option>` + tL.map(v => `<option value="${v}">${v}</option>`).join('');
  document.getElementById('sWhere').innerHTML = `<option value="">${cn ? '选择地点' : 'Select Location'}</option>` + lL2.map(v => `<option value="${v}">${v}</option>`).join('');
  
  document.getElementById('gRes').className = 'res';
  document.getElementById('gProg').style.width = '0%';
}

function renderDed() {
  const cn = L === 'cn', w = cn ? C.who : C.whoE, t = cn ? C.what : C.whatE, l = cn ? C.where : C.whereE;
  let h = '<h3 data-cn="推理排除表" data-en="Deduction Grid">推理排除表</h3>';
  h += '<p style="color:#a89080;font-size:0.8rem;margin-bottom:10px;" data-cn="点击圆圈标记：空白=未知，✗=排除，✓=确认" data-en="Click circles to mark: blank=unknown, ✗=eliminated, ✓=confirmed"></p>';
  
  h += '<div style="margin-bottom:16px;overflow-x:auto"><div style="color:#d4a843;font-size:0.85rem;margin-bottom:6px;font-weight:700" data-cn="人物 × 道具" data-en="Character × Object">人物 × 道具</div>';
  h += '<table class="dedT"><thead><tr><th></th>' + t.map(v => `<th>${v}</th>`).join('') + '</tr></thead><tbody>';
  w.forEach((who, i) => { h += `<tr><td>${who}</td>`; t.forEach(what => { h += `<td><span class="cell" onclick="tc(this)"></span></td>`; }); h += '</tr>'; });
  h += '</tbody></table></div>';
  
  h += '<div style="margin-bottom:16px;overflow-x:auto"><div style="color:#d4a843;font-size:0.85rem;margin-bottom:6px;font-weight:700" data-cn="人物 × 地点" data-en="Character × Location">人物 × 地点</div>';
  h += '<table class="dedT"><thead><tr><th></th>' + l.map(v => `<th>${v}</th>`).join('') + '</tr></thead><tbody>';
  w.forEach((who, i) => { h += `<tr><td>${who}</td>`; l.forEach(where => { h += `<td><span class="cell" onclick="tc(this)"></span></td>`; }); h += '</tr>'; });
  h += '</tbody></table></div>';
  
  h += '<div style="overflow-x:auto"><div style="color:#d4a843;font-size:0.85rem;margin-bottom:6px;font-weight:700" data-cn="道具 × 地点" data-en="Object × Location">道具 × 地点</div>';
  h += '<table class="dedT"><thead><tr><th></th>' + l.map(v => `<th>${v}</th>`).join('') + '</tr></thead><tbody>';
  t.forEach((what, i) => { h += `<tr><td>${what}</td>`; l.forEach(where => { h += `<td><span class="cell" onclick="tc(this)"></span></td>`; }); h += '</tr>'; });
  h += '</tbody></table></div>';
  
  document.getElementById('gDed').innerHTML = h;
}

function tc(el) {
  if (el.classList.contains('x')) { el.classList.remove('x'); el.classList.add('o'); el.textContent = '✓'; }
  else if (el.classList.contains('o')) { el.classList.remove('o'); el.textContent = ''; }
  else { el.classList.add('x'); el.textContent = '✗'; }
  upProg();
}

function swTab(tab) {
  T = tab;
  document.querySelectorAll('.bar button').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('pan-' + tab).classList.add('on');
}

function upProg() {
  const m = document.querySelectorAll('.cell.x, .cell.o').length;
  const tot = C.who.length * C.what.length + C.who.length * C.where.length + C.what.length * C.where.length;
  document.getElementById('gProg').style.width = Math.min(m / tot * 60, 100) + '%';
}

function submitAns() {
  const cn = L === 'cn';
  const who = document.getElementById('sWho').value, what = document.getElementById('sWhat').value, where = document.getElementById('sWhere').value;
  if (!who || !what || !where) { alert(cn ? '请完整选择人物、道具和地点' : 'Please select Character, Object, and Location'); return; }
  
  const ans = cn ? C.ans : C.ansE, ok = who === ans.who && what === ans.what && where === ans.where;
  const r = document.getElementById('gRes');
  r.className = 'res ' + (ok ? 'ok' : 'no') + ' on';
  
  if (ok) {
    r.innerHTML = `<div class="cn">🎉 推理正确！案件真相：${C.ans.who} + ${C.ans.what} + ${C.ans.where}</div>
      <div class="en ${cn ? 'hide' : ''}">🎉 Correct! The truth: ${C.ansE.who} + ${C.ansE.what} + ${C.ansE.where}</div>`;
  } else {
    const wp = [];
    if (who !== ans.who) wp.push(cn ? '人物' : 'Character');
    if (what !== ans.what) wp.push(cn ? '道具' : 'Object');
    if (where !== ans.where) wp.push(cn ? '地点' : 'Location');
    r.innerHTML = `<div class="cn">❌ 推理有误。请重新检查${wp.join('、')}的线索。</div>
      <div class="en ${cn ? 'hide' : ''}">❌ Incorrect. Please re-check the clues for ${wp.join(', ')}.</div>`;
  }
}

showHome();
</script>
